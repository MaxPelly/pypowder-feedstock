{% set version = "1.0" %}

package:
  name: pypowder
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/P/PyPowder/pypowder-{{ version }}.tar.gz
  sha256: 8ef1d45f80234edd8fb99f6960810cca87d6ecda79b768861039547a22f2464a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=77.0.3
    - setuptools-scm >=9.2
    - pip
  run:
    - python >={{ python_min }}
    - pandas
    - numpy
    - xmltodict
    - matplotlib-base

test:
  imports:
    - PyPOW
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MaxPelly/PyPOW
  summary: Attempt at constructing a set of tools to convert XRDML files to a more usable format.
  license: GPL-3.0-or-later
  license_file: LICENCE

extra:
  recipe-maintainers:
    - dafda1
    - MaxPelly
